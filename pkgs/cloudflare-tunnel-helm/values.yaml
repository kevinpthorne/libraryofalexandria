# Cloudflare parameters.
cloudflare:
  # The name of the Kubernetes secret containing the tunnel token
  tunnelKeySecret: ""
  # The key in the secret containing the tunnel token
  tunnelKeySecretKey: ""
  # The UUID of the tunnel
  tunnelId: ""
  # If true, turn on WARP routing for TCP
  enableWarp: false
  # Define ingress rules for the tunnel.
  ingress: []

image:
  repository: cloudflare/cloudflared
  pullPolicy: IfNotPresent
  # If supplied, this overrides the appVersion
  tag: ""

tokenDecoder:
  image:
    repository: alpine
    tag: 3.18
    pullPolicy: IfNotPresent

replicaCount: 2

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

# Security items common to everything in the pod.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault

# Security items for one container.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
