{{- range .Values.endpoints }}
{{- $endpoint := . }}
{{- range $endpoint.ports }}
{{- if eq .protocol "TLS" }}
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: {{ $endpoint.name }}-{{ .protocol | lower }}-{{ .port }}
  namespace: {{ $endpoint.namespace | default $.Release.Namespace }}
  {{- if .annotations }}
  annotations:
    {{- toYaml .annotations | nindent 4 }}
  {{- end }}
  {{- if .labels }}
  labels:
    {{- toYaml .labels | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
  - name: {{ $endpoint.gatewayName | default $endpoint.name }}
    namespace: {{ $endpoint.gatewayNamespace | default ($endpoint.namespace | default $.Release.Namespace) }}
    sectionName: {{ .protocol | lower }}-{{ .port }}
  {{- if $endpoint.hostnames }}
  hostnames:
  {{- range $endpoint.hostnames }}
  - {{ . | quote }}
  {{- end }}
  {{- end }}
  rules:
  - backendRefs:
    - name: {{ .targetService | default $endpoint.name }}
      port: {{ .targetPort | default .port }}
{{- end }}
{{- end }}
{{- end }}
