# 1. Generate the Root CA Certificate using your SelfSigned bootstrap
apiVersion: v1
kind: Secret
metadata:
  name: app-{{ .Release.Name }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    pki.loa.kevinpthorne.com/trusted-ca: "true"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: app-{{ .Release.Name }}
spec:
  isCA: true
  commonName: app-{{ .Release.Name }}
  secretName: app-{{ .Release.Name }}-secret
  privateKey:
    algorithm: RSA
    size: 2048
    rotationPolicy: Always
  issuerRef:
    name: {{ .Release.Name }}
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: app-{{ .Release.Name }}-issuer
spec:
  ca:
    secretName: app-{{ .Release.Name }}-secret