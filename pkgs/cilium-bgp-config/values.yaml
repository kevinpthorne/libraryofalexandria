configs:
  - name: p2p-vpn-peering
    localASN: 65000
    exportPodCIDR: false
    # nodeSelector allows pinning this policy to specific nodes, empty matches all linux nodes
    nodeSelector: {}
    neighbors:
      - peerAddress: "10.255.255.1" # The ClusterIP or LoadBalancer IP of p2p-vpn
        peerASN: 65001
