apiVersion: v1
kind: Service
metadata:
  name: powerdns
  namespace: {{ .Release.Namespace }}
  labels:
    app: powerdns
  {{- if .Values.staticIP }}
  annotations:
    lbipam.cilium.io/ips: {{ .Values.staticIP }}
  {{- end }}
spec:
  type: LoadBalancer
  selector:
    app: powerdns
  ports:
    - name: dns-udp
      port: 53
      targetPort: 5353
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 5353
      protocol: TCP
    - name: api
      port: 8081
      targetPort: 8081
      protocol: TCP