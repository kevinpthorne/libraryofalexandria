apiVersion: apps/v1
kind: Deployment
metadata:
  name: powerdns
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: powerdns
  template:
    metadata:
      labels:
        app: powerdns
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
      initContainers:
      - name: init-sqlite
        image: python:3-alpine
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        command: ["python", "-c"]
        args:
        - |
          import os
          import urllib.request
          import sqlite3

          db_path = "/var/lib/powerdns/pdns.sqlite3"
          schema_url = "https://raw.githubusercontent.com/PowerDNS/pdns/rel/auth-5.0.x/modules/gsqlite3backend/schema.sqlite3.sql"

          if not os.path.exists(db_path) or os.path.getsize(db_path) == 0:
              print("Downloading schema...")
              schema = urllib.request.urlopen(schema_url).read().decode("utf-8")
              print("Initializing database...")
              conn = sqlite3.connect(db_path)
              conn.executescript(schema)
              conn.close()
              print("Database initialized.")
        volumeMounts:
        - name: pdns-storage
          mountPath: /var/lib/powerdns
      containers:
      - name: powerdns
        image: powerdns/pdns-auth-50:5.0.4
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: PDNS_API_KEY
          valueFrom:
            secretKeyRef:
              name: powerdns-secret
              key: api-key
        - name: SSL_CERT_FILE
          value: /etc/ssl/certs/ca-bundle.crt
        ports:
        - containerPort: 5353
          protocol: UDP
        - containerPort: 5353
          protocol: TCP
        - containerPort: 8081 # The API port for ExternalDNS
          protocol: TCP

        args:
        - "--api=yes"
        - "--api-key=$(PDNS_API_KEY)" # ExternalDNS uses this
        - "--webserver=yes"
        - "--webserver-address=0.0.0.0"
        - "--webserver-port=8081"
        - "--webserver-allow-from={{ .Values.cluster.clusterCidr }}"
        - "--launch=gsqlite3"
        - "--gsqlite3-database=/var/lib/powerdns/pdns.sqlite3"
        - "--gsqlite3-dnssec=yes"
        volumeMounts:
        - name: pdns-storage
          mountPath: /var/lib/powerdns
        - name: trusted-ca-volume
          mountPath: /etc/ssl/certs/custom-trusted-ca.pem
          subPath: ca-bundle.crt
        - name: pdns-run
          mountPath: /var/run
      volumes:
      - name: pdns-storage
        persistentVolumeClaim:
          claimName: powerdns-pvc # Maps to a simple 1GB PVC
      - name: trusted-ca-volume
        configMap:
          name: trusted-ca-bundle
      - name: pdns-run
        emptyDir: {}