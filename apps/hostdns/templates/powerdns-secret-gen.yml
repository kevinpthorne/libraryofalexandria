# 1. Define the Password Generator
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: powerdns-api-key-gen
  namespace: {{ .Release.Namespace }}
spec:
  length: 32
  digits: 5
  symbols: 0               # Set to a number if PowerDNS requires/allows symbols
  noUpper: false
  allowRepeat: true

---
# 2. Define the ExternalSecret to create the K8s Secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: powerdns-secret
  namespace: {{ .Release.Namespace }}
spec:
  # Set to 0 so the password isn't continuously regenerated, 
  # which would cause unexpected application state changes.
  refreshInterval: "0" 
  target:
    name: powerdns-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Helm escaping is required here so ESO handles the templating, not Helm.
        # The generator defaults to outputting the value under the key ".password".
        api-key: '{{ "{{ .password }}" }}'
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: powerdns-api-key-gen