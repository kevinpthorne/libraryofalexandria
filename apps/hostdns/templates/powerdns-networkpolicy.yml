apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: powerdns-api-allow
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: powerdns
  policyTypes:
    - Ingress
  ingress:
    # Allow DNS queries from anywhere
    - ports:
      - protocol: UDP
        port: 5353
      - protocol: TCP
        port: 5353
    # Allow API traffic ONLY from external-dns pods in this namespace
    - ports:
      - protocol: TCP
        port: 8081
      from:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: external-dns
