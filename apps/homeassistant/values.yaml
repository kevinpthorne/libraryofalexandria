replicaCount: 1

image:
  repository: ghcr.io/home-assistant/home-assistant
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

timezone: "EST"

service:
  type: LoadBalancer
  port: 8123

persistence:
  enabled: true
  storageClass: "longhorn"
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /config

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 512Mi

otbr:
  enabled: false
  image:
    repository: ghcr.io/ownbee/hass-otbr-docker
    tag: latest
    pullPolicy: IfNotPresent
  devicePath: "/dev/ttyUSB0"
  deviceHostPath: "" # e.g. "/dev/serial/by-id/usb-Silicon_Labs_CP2102N_YOUR_DEVICE_ID-if00-port0" to mount via hostPath
  baudRate: "460800"
  flowControl: "1"
  hostInterface: "eth0"
  persistence:
    enabled: true
    hostPath: "/var/lib/otbr-thread"
  resources: {}

