apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Chart.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: {{ .Chart.Name }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      hostNetwork: true
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        supplementalGroups: [20] # Grant access to the host's dialout group for USB serial access
      initContainers:
        - name: bootstrap-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          command:
            - /bin/sh
            - -c
            - |
              if [ ! -f /config/configuration.yaml ]; then
                cp /bootstrap/configuration.yaml /config/configuration.yaml
                touch /config/automations.yaml /config/scripts.yaml /config/scenes.yaml
                mkdir -p /config/themes
                echo "Bootstrap configuration and include files created."
              else
                echo "configuration.yaml already exists. Skipping bootstrap."
              fi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: bootstrap
              mountPath: /bootstrap
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: TZ
              value: {{ .Values.timezone }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tls-certs
              mountPath: /ssl
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: config
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
        {{- if .Values.otbr.enabled }}
        - name: otbr
          image: "{{ .Values.otbr.image.repository }}:{{ .Values.otbr.image.tag }}"
          imagePullPolicy: {{ .Values.otbr.image.pullPolicy }}
          securityContext:
            privileged: true
          env:
            - name: DEVICE
              value: {{ .Values.otbr.devicePath | quote }}
            - name: BAUDRATE
              value: {{ .Values.otbr.baudRate | quote }}
            - name: FLOW_CONTROL
              value: {{ .Values.otbr.flowControl | quote }}
            - name: BACKBONE_IF
              value: {{ .Values.otbr.hostInterface | quote }}
          {{- if or .Values.otbr.deviceHostPath .Values.otbr.persistence.enabled }}
          volumeMounts:
            {{- if .Values.otbr.deviceHostPath }}
            - name: usb-device
              mountPath: {{ .Values.otbr.devicePath }}
            {{- end }}
            {{- if .Values.otbr.persistence.enabled }}
            - name: thread-state
              mountPath: /data
            {{- end }}
          {{- end }}
          {{- if .Values.otbr.resources }}
          resources:
            {{- toYaml .Values.otbr.resources | nindent 12 }}
          {{- end }}
        {{- end }}
      volumes:
        - name: tls-certs
          secret:
            secretName: homeassistant-tls
        - name: bootstrap
          configMap:
            name: {{ .Chart.Name }}-bootstrap-config
        {{- if .Values.persistence.enabled }}
        - name: config
          persistentVolumeClaim:
            claimName: {{ .Chart.Name }}-pvc
        {{- end }}
        {{- if .Values.otbr.enabled }}
        {{- if .Values.otbr.deviceHostPath }}
        - name: usb-device
          hostPath:
            path: {{ .Values.otbr.deviceHostPath }}
        {{- end }}
        {{- if .Values.otbr.persistence.enabled }}
        - name: thread-state
          hostPath:
            path: {{ .Values.otbr.persistence.hostPath | default "/var/lib/otbr-thread" }}
            type: DirectoryOrCreate
        {{- end }}
        {{- end }}
