apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "adguard.fullname" . }}
data:
  AdGuardHome.yaml: |
    bind_host: 0.0.0.0
    bind_port: 8080
    auth_attempts: 5
    block_auth_min: 15
    http_proxy: ""
    language: en
    theme: auto
    debug_pprof: false
    web_session_ttl: 720
    dns:
      bind_hosts:
      - 0.0.0.0
      port: 5353
      statistics_interval: 1
      querylog_enabled: true
      querylog_file_enabled: true
      querylog_interval: 90
      querylog_size_memory: 1000
      anonymize_client_ip: false
      protection_enabled: true
      blocking_mode: default
      blocking_ipv4: ""
      blocking_ipv6: ""
      blocked_response_ttl: 10
      parental_block_host: family-block.dns.adguard.com
      safebrowsing_block_host: standard-block.dns.adguard.com
      ratelimit: 20
      ratelimit_whitelist: []
      refuse_any: true
      upstream_dns:
{{- range .Values.upstreamDns }}
      - {{ . | quote }}
{{- end }}
      upstream_dns_file: ""
      all_servers: false
      fastest_addr: false
      fastest_timeout: 1s
      allowed_clients: []
      disallowed_clients: []
      blocked_hosts:
      - version.bind
      - id.server
      - hostname.bind
      trusted_proxies:
      - 127.0.0.0/8
      - ::1/128
      cache_size: 4194304
      cache_ttl_min: 0
      cache_ttl_max: 0
      cache_optimistic: false
      bogus_nxdomain: []
      aaaa_disabled: false
      enable_dnssec: false
      edns_client_subnet:
        custom_ip: ""
        enabled: false
        use_custom: false
      max_goroutines: 300
      handle_ddr: true
      serve_http3: false
      use_http3_upstreams: false
      local_ptr_upstreams: []
      use_private_ptr_resolvers: true
      resolve_clients: true
      rewrites:
      - domain: '{{ .Values.adguard.domain }}'
        answer: '{{ .Values.adguard.staticIP }}'
      {{- range .Values.adguard.additionalRewrites }}
      - domain: '{{ .domain }}'
        answer: '{{ .answer }}'
      {{- end }}
    tls:
      enabled: true
      server_name: {{ .Values.adguard.domain }}
      force_https: true
      port_https: 8443
      port_dns_over_tls: 8853
      port_dns_over_quic: 8853
      port_dnscrypt: 0
      dnscrypt_config_file: ""
      allow_unencrypted_doh: false
      certificate_chain: ""
      private_key: ""
      certificate_path: /etc/adguard-tls/tls.crt
      private_key_path: /etc/adguard-tls/tls.key
      strict_sni_check: false
    filters:
    - enabled: true
      url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt
      name: AdGuard DNS filter
      id: 1
    - enabled: true
      url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_2.txt
      name: AdAway Default Blocklist
      id: 2
    users:
    - name: admin
      password: __PASSWORD_HASH__
