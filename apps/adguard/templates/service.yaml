apiVersion: v1
kind: Service
metadata:
  name: {{ include "adguard.fullname" . }}-lb
  labels:
    app.kubernetes.io/name: {{ include "adguard.name" . }}
    helm.sh/chart: {{ include "adguard.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  {{- if .Values.adguard.staticIP }}
  annotations:
    io.cilium/bgp-virtual-ips: {{ .Values.adguard.staticIP }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 53
      targetPort: {{ .Values.service.targetDnsPort }}
      protocol: UDP
      name: dns-udp
    - port: 53
      targetPort: {{ .Values.service.targetDnsPort }}
      protocol: TCP
      name: dns-tcp
  selector:
    app.kubernetes.io/name: {{ include "adguard.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "adguard.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "adguard.name" . }}
    helm.sh/chart: {{ include "adguard.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  {{- if .Values.adguard.domain }}
  annotations:
    io.cilium/bgp-virtual-ips: {{ .Values.adguard.domain }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.webHttpsPort }}
      targetPort: 8443
      protocol: TCP
      name: https
  selector:
    app.kubernetes.io/name: {{ include "adguard.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
