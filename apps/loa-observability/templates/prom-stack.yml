---
# 1. THE METRICS & VISUALIZATION STACK
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: {{ .Values.argoNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"  # this app creates the namespace
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: 58.x.x
    helm:
      values: |
        # ---------------------------------------------------------
        # PROMETHEUS NODE EXPORTER
        # ---------------------------------------------------------
        prometheus-node-exporter:
          tolerations:
            - effect: NoSchedule
              operator: Exists
            - effect: NoExecute
              operator: Exists
          extraArgs:
            - --web.config.file=/etc/node-exporter-config/web-config.yaml
          configmaps:
            - name: node-exporter-web-config
              mountPath: /etc/node-exporter-config
          secrets:
            - name: node-exporter-tls
              mountPath: /etc/node-exporter-tls
          livenessProbe:
            httpGet:
              path: /
              port: 9100
              scheme: HTTPS
          readinessProbe:
            httpGet:
              path: /
              port: 9100
              scheme: HTTPS
          prometheus:
            monitor:
              scheme: https
              tlsConfig:
                # IPs won't match the CSI cert DNS, skipping verify is standard for DaemonSets
                insecureSkipVerify: true 

        # ---------------------------------------------------------
        # GRAFANA
        # ---------------------------------------------------------
        grafana:
          enabled: true
          service:
            port: 443
            targetPort: 3000
          sidecar:
            datasources:
              url: https://prometheus-operated.observability.svc.cluster.local:9090
          grafana.ini:
            server:
              protocol: https
              domain: grafana.{{ .Values.cluster.name }}.loa.internal
              root_url: https://grafana.{{ .Values.cluster.name }}.loa.internal/
              cert_file: /etc/grafana-tls/tls.crt
              cert_key: /etc/grafana-tls/tls.key
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
              scheme: HTTPS
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
              scheme: HTTPS
          env:
            SSL_CERT_FILE: /etc/ssl/certs/custom-ca/ca-bundle.crt
          envValueFrom:
            DISCORD_WEBHOOK_URL:
              secretKeyRef:
                name: discord-webhook
                key: url
          alerting:
            contactpoints.yaml:
              secret:
                apiVersion: 1
                contactPoints:
                  - orgId: 1
                    name: Discord
                    receivers:
                      - uid: discord_1
                        type: discord
                        settings:
                          url: $__env{DISCORD_WEBHOOK_URL}
          extraVolumes:
            - name: grafana-tls
              csi:
                driver: csi.cert-manager.io
                readOnly: true
                volumeAttributes:
                  csi.cert-manager.io/issuer-group: "cert-manager.io"
                  csi.cert-manager.io/issuer-kind: ClusterIssuer
                  csi.cert-manager.io/issuer-name: "app-pki-bootstrap-issuer"
                  csi.cert-manager.io/dns-names: "grafana.observability.svc,grafana.observability.svc.cluster.local,grafana.{{ .Values.cluster.name }}.loa.internal"
            - name: ca-bundle
              configMap:
                name: trusted-ca-bundle
          extraVolumeMounts:
            - name: grafana-tls
              mountPath: /etc/grafana-tls
              readOnly: true
            - name: ca-bundle
              mountPath: /etc/ssl/certs/custom-ca
              readOnly: true
          # Instruct Prometheus to scrape Grafana via HTTPS
          serviceMonitor:
            scheme: https
            tlsConfig:
              caFile: /etc/ssl/certs/custom-ca/ca-bundle.crt
              serverName: grafana.observability.svc
          # Pre-wire Loki into Grafana
          additionalDataSources:
            - name: Loki
              type: loki
              url: https://loki.observability.svc.cluster.local:3100
              access: proxy
              isDefault: false
              jsonData:
                tlsAuthWithCACert: true
          # Strict Security Context for Grafana
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

        # ---------------------------------------------------------
        # PROMETHEUS
        # ---------------------------------------------------------
        prometheus:
          # Instruct Prometheus to scrape itself via HTTPS
          serviceMonitor:
            scheme: https
            tlsConfig:
              caFile: /etc/ssl/certs/custom-ca/ca-bundle.crt
              serverName: prometheus-operated.observability.svc
          prometheusSpec:
            retention: 14d
            retentionSize: 18GB
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
            # Tell Prometheus to serve HTTPS on its UI/API
            web:
              tlsConfig:
                cert:
                  secret:
                    name: prometheus-tls
                    key: tls.crt
                keySecret:
                  name: prometheus-tls
                  key: tls.key
            volumes:
              - name: ca-bundle
                configMap:
                  name: trusted-ca-bundle
            volumeMounts:
              - name: ca-bundle
                mountPath: /etc/ssl/certs/custom-ca
                readOnly: true
            containers:
              - name: prometheus
                env:
                  - name: SSL_CERT_FILE
                    value: /etc/ssl/certs/custom-ca/ca-bundle.crt
                livenessProbe:
                  httpGet:
                    path: /-/healthy
                    port: 9090
                    scheme: HTTPS
                readinessProbe:
                  httpGet:
                    path: /-/ready
                    port: 9090
                    scheme: HTTPS
            # Strict Security Context for Prometheus
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              fsGroup: 2000
              seccompProfile:
                type: RuntimeDefault
            containerSecurityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/audit: privileged
        pod-security.kubernetes.io/warn: privileged