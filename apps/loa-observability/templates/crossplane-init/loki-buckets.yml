apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crossplane-eso-secret-reader
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
rules:
- apiGroups: [""]
  resources: ["secrets"]
  # Optional: Restrict to ONLY the bootstrap secret for tight security
  resourceNames: ["loki-s3-creds"] 
  verbs: ["get", "list", "watch", "create", "edit"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crossplane-eso-secret-writer-binding
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
subjects:
- kind: ServiceAccount
  name: crossplane
  namespace: crossplane-system # Note: Pointing to the SA in the other namespace
roleRef:
  kind: Role
  name: crossplane-eso-secret-reader
  apiGroup: rbac.authorization.k8s.io
---
# 2. Create the IAM User in SeaweedFS
apiVersion: iam.aws.upbound.io/v1beta1
kind: User
metadata:
  name: loki-app-user
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  forProvider: {}
  providerConfigRef:
    name: seaweedfs-provider-config

---
# 3. Generate the Access Key for that User
apiVersion: iam.aws.upbound.io/v1beta1
kind: AccessKey
metadata:
  name: loki-app-user-key
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  forProvider:
    userNameRef:
      name: loki-app-user
  providerConfigRef:
    name: seaweedfs-provider-config
  # Crossplane will save the dynamically generated SeaweedFS Key & Secret here
  writeConnectionSecretToRef:
    namespace: observability
    name: loki-s3-creds
    
---    
apiVersion: s3.aws.upbound.io/v1beta1
kind: Bucket
metadata:
  name: loki-data
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  forProvider:
    region: unused
    # SeaweedFS / Minio require path-style routing
    objectLockEnabled: false
  providerConfigRef:
    name: seaweedfs-provider-config

---
apiVersion: s3.aws.upbound.io/v1beta1
kind: Bucket
metadata:
  name: loki-ruler
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  forProvider:
    region: unused
    objectLockEnabled: false
  providerConfigRef:
    name: seaweedfs-provider-config

---
apiVersion: s3.aws.upbound.io/v1beta1
kind: Bucket
metadata:
  name: loki-admin
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  forProvider:
    region: unused
    objectLockEnabled: false
  providerConfigRef:
    name: seaweedfs-provider-config
---
# 4a. Create the Managed Policy
apiVersion: iam.aws.upbound.io/v1beta1
kind: Policy
metadata:
  name: loki-s3-access-policy
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  forProvider:
    name: loki-s3-access-policy
    description: "Allows Loki user to access its S3 buckets"
    # Standard AWS IAM JSON policy document
    policy: |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Effect": "Allow",
            "Action": [
              "s3:ListBucket",
              "s3:PutObject",
              "s3:GetObject",
              "s3:DeleteObject"
            ],
            "Resource": [
              "arn:aws:s3:::loki-data",
              "arn:aws:s3:::loki-data/*",
              "arn:aws:s3:::loki-ruler",
              "arn:aws:s3:::loki-ruler/*",
              "arn:aws:s3:::loki-admin",
              "arn:aws:s3:::loki-admin/*"
            ]
          }
        ]
      }
  providerConfigRef:
    name: seaweedfs-provider-config

---
# 4b. Attach the Policy to the IAM User
apiVersion: iam.aws.upbound.io/v1beta1
kind: UserPolicyAttachment
metadata:
  name: loki-app-user-policy-attach
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  forProvider:
    # Dynamically reference the user Crossplane created
    userRef:
      name: loki-app-user
    # Dynamically reference the policy Crossplane created above
    policyArnRef:
      name: loki-s3-access-policy
  providerConfigRef:
    name: seaweedfs-provider-config