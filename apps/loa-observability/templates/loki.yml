# 2. THE LOG STORAGE BACKEND
{{- if .Values.loki.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: {{ .Values.argoNamespace }}
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: loki
    targetRevision: 5.x.x
    helm:
      values: |
        loki:
          auth_enabled: false
          
          # 1. INSTRUCT LOKI TO SERVE TRAFFIC OVER TLS
          server:
            http_tls_config:
              cert_file: /etc/loki/tls/tls.crt
              key_file: /etc/loki/tls/tls.key
            grpc_tls_config:
              cert_file: /etc/loki/tls/tls.crt
              key_file: /etc/loki/tls/tls.key

          commonConfig:
            replication_factor: 1

          storage:
            type: s3
            bucketNames:
              chunks: loki-data
              ruler: loki-ruler
              admin: loki-admin
            s3:
              endpoint: "seaweed-cluster-s3-https.seaweedfs-system.svc.cluster.local:8333"
              region: "us-east-1"
              s3ForcePathStyle: true
              insecure: false
        
          # Strict Security Context for Loki
          podSecurityContext:
            fsGroup: 10001
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              
        singleBinary:
          replicas: 1

          extraVolumes:
            - name: ca-bundle-volume
              configMap:
                name: trusted-ca-bundle
            - name: loki-tls-volume
              csi:
                driver: csi.cert-manager.io
                readOnly: true
                volumeAttributes:
                  csi.cert-manager.io/issuer-name: "app-pki-bootstrap-issuer"
                  csi.cert-manager.io/issuer-kind: "ClusterIssuer"
                  csi.cert-manager.io/issuer-group: "cert-manager.io"
                  csi.cert-manager.io/dns-names: "${POD_NAME}.${POD_NAMESPACE}.svc.cluster.local,${POD_NAME}.${POD_NAMESPACE}.svc.cluster.{{ .Values.cluster.name }},${POD_NAME}.{{ .Values.cluster.name }}.loa.internal"
                
          extraVolumeMounts:
            - name: ca-bundle-volume
              mountPath: /etc/loki/certs
              readOnly: true
            - name: loki-tls-volume
              mountPath: /etc/loki/tls
              readOnly: true
              
          extraEnv:
            - name: SSL_CERT_FILE
              value: "/etc/loki/certs/ca-bundle.crt"
              
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: loki-s3-creds
                  key: access_key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: loki-s3-creds
                  key: secret_key
        read:
          replicas: 0
        backend:
          replicas: 0
        write:
          replicas: 0
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
{{- end }}