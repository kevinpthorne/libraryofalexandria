apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: p2p-vpn
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: p2p-vpn
  serviceName: "p2p-vpn"
  template:
    metadata:
      labels:
        app: p2p-vpn
    spec:
      containers:
        - name: p2p-vpn
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            privileged: true
          env:
            - name: P2P_VPN_MODE
              value: "endpoint"
            - name: P2P_VPN_PORT
              value: {{ .Values.p2pVpn.p2pPort | quote }}
            - name: P2P_VPN_CLUSTER
              value: {{ .Values.p2pVpn.cluster | quote }}
            - name: P2P_VPN_TUN_IP
              value: {{ .Values.p2pVpn.address | quote }}
            {{- if .Values.p2pVpn.bootstrapPeers }}
            - name: P2P_VPN_RELAY
              value: {{ join "," .Values.p2pVpn.bootstrapPeers | quote }}
            {{- end }}
            {{- if .Values.bgp.localCIDRs }}
            - name: P2P_VPN_ADVERTISE
              value: {{ join "," .Values.bgp.localCIDRs | quote }}
            {{- end }}
            - name: P2P_VPN_DATAKEY
              value: "/etc/p2p-vpn/data/{{ .Values.p2pVpn.dataKeySecretKey | default "token" }}"
            {{- if .Values.p2pVpn.identitySecretName }}
            - name: P2P_VPN_IDENTITY
              value: "/etc/p2p-vpn/identity/{{ .Values.p2pVpn.identitySecretKey | default "identity.key" }}"
            {{- else }}
            - name: P2P_VPN_IDENTITY
              value: "/var/lib/p2p-vpn/identity.key"
            {{- end }}
            {{- if .Values.p2pVpn.configMapName }}
            {{- if .Values.p2pVpn.caConfigMapKey }}
            - name: P2P_VPN_CA_KEY
              value: "/etc/p2p-vpn/config/{{ .Values.p2pVpn.caConfigMapKey }}"
            {{- end }}
            {{- if .Values.p2pVpn.sigConfigMapKey }}
            - name: P2P_VPN_NODE_SIG
              value: "/etc/p2p-vpn/config/{{ .Values.p2pVpn.sigConfigMapKey }}"
            {{- end }}
            {{- if .Values.p2pVpn.whitelistConfigMapKey }}
            - name: P2P_VPN_ALLOWED_PEERS
              value: "/etc/p2p-vpn/config/{{ .Values.p2pVpn.whitelistConfigMapKey }}"
            {{- end }}
            {{- end }}
          ports:
            - name: p2p-tcp
              containerPort: {{ .Values.p2pVpn.p2pPort }}
              protocol: TCP
            - name: p2p-udp
              containerPort: {{ .Values.p2pVpn.p2pPort }}
              protocol: UDP
          volumeMounts:
            - name: data-volume
              mountPath: /etc/p2p-vpn/data
              readOnly: true
            {{- if .Values.p2pVpn.identitySecretName }}
            - name: identity-volume
              mountPath: /etc/p2p-vpn/identity
              readOnly: true
            {{- else }}
            - name: p2p-vpn-data
              mountPath: /var/lib/p2p-vpn
            {{- end }}
            {{- if .Values.p2pVpn.configMapName }}
            - name: config-volume
              mountPath: /etc/p2p-vpn/config
              readOnly: true
            {{- end }}
            - name: tun
              mountPath: /dev/net/tun

        - name: frr
          image: "{{ .Values.frr.image.repository }}:{{ .Values.frr.image.tag }}"
          imagePullPolicy: {{ .Values.frr.image.pullPolicy }}
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW", "SYS_ADMIN"]
          volumeMounts:
            - name: frr-config
              mountPath: /etc/frr
      volumes:
        - name: frr-config
          configMap:
            name: p2p-vpn-frr-config
        - name: tun
          hostPath:
            path: /dev/net/tun
        - name: data-volume
          secret:
            secretName: {{ .Values.p2pVpn.dataKeySecretName }}
            items:
              - key: {{ .Values.p2pVpn.dataKeySecretKey }}
                path: {{ .Values.p2pVpn.dataKeySecretKey | default "token" }}
        {{- if .Values.p2pVpn.identitySecretName }}
        - name: identity-volume
          secret:
            secretName: {{ .Values.p2pVpn.identitySecretName }}
            items:
              - key: {{ .Values.p2pVpn.identitySecretKey | default "identity.key" }}
                path: {{ .Values.p2pVpn.identitySecretKey | default "identity.key" }}
        {{- else }}
        {{- if not .Values.persistence.enabled }}
        - name: p2p-vpn-data
          emptyDir: {}
        {{- end }}
        {{- end }}
        {{- if .Values.p2pVpn.configMapName }}
        - name: config-volume
          configMap:
            name: {{ .Values.p2pVpn.configMapName }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

  {{- if and (not .Values.p2pVpn.identitySecretName) .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: p2p-vpn-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        {{- if .Values.persistence.storageClass }}
        storageClassName: "{{ .Values.persistence.storageClass }}"
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
