apiVersion: v1
kind: ConfigMap
metadata:
  name: kamailio-config
  labels:
    app: kamailio
data:
  kamailio.cfg: |
    #!KAMAILIO
    
    # --- GLOBAL CONFIGURATION ---
    #!define ASTERISK_HOST "asterisk.{{ .Release.Namespace }}.svc.cluster.local"
    #!define ASTERISK_PORT "{{ .Values.asterisk.ports.sip }}"
    #!define RTPENGINE_SOCK "udp:rtpengine.{{ .Release.Namespace }}-rtpengine.svc.cluster.local:{{ .Values.rtpengine.ports.control }}"
    
    # --- MODULES ---
    loadmodule "sl.so"
    loadmodule "tm.so"
    loadmodule "rr.so"
    loadmodule "maxfwd.so"
    loadmodule "textops.so"
    loadmodule "rtpengine.so"
    
    modparam("rtpengine", "rtpengine_sock", RTPENGINE_SOCK)
    
    # --- MAIN ROUTING LOGIC ---
    request_route {
        if (!mf_process_maxfwd_header("10")) {
            sl_send_reply("483", "Too Many Hops");
            exit;
        }
    
        if (is_method("CANCEL")) {
            if (t_check_trans()) t_relay();
            exit;
        }
    
        if (has_totag()) {
            if (loose_route()) {
                if (is_method("BYE")) {
                    rtpengine_manage();
                }
                route(RELAY);
                exit;
            }
        }
    
        if (is_method("INVITE")) {
            record_route();
            
            # INBOUND FROM TELNYX
            if ($si == "192.76.120.10" || $si == "192.76.120.11") {
                rtpengine_manage("replace-origin replace-session-connection");
                $ru = "sip:" + $rU + "@" + ASTERISK_HOST + ":" + ASTERISK_PORT;
                route(RELAY);
                exit;
            }
            
            # OUTBOUND TO TELNYX (From internal K8s subnets)
            if ($si =~ "^10\.") {
                if ($rU =~ "^1[0-9]{10}$") { 
                    rtpengine_manage("replace-origin replace-session-connection");
                    $ru = "sip:" + $rU + "@sip.telnyx.com";
                    route(RELAY);
                    exit;
                }
            }

            # STANDARD INTERNAL ROUTING TO ASTERISK
            rtpengine_manage("replace-origin replace-session-connection");
            $ru = "sip:" + $rU + "@" + ASTERISK_HOST + ":" + ASTERISK_PORT;
            route(RELAY);
            exit;
        }
    
        sl_send_reply("501", "Not Implemented");
    }
    
    route[RELAY] {
        if (!t_relay()) sl_reply_error();
        exit;
    }
    
    onreply_route {
        if (has_body("application/sdp")) {
            rtpengine_manage("replace-origin replace-session-connection");
        }
    }