apiVersion: v1
kind: ConfigMap
metadata:
  name: kamailio-config
  labels:
    app: kamailio
data:
  kamailio.cfg: |
    #!KAMAILIO
    
    # --- GLOBAL CONFIGURATION ---
    #!define ASTERISK_HOST "{{ .Release.Name }}-asterisk.{{ .Release.Namespace }}.svc.cluster.local"
    #!define ASTERISK_PORT "{{ .Values.asterisk.ports.sip }}"
    #!define RTPENGINE_SOCK "udp:rtpengine.{{ .Release.Name }}-rtpengine.svc.cluster.local:{{ .Values.rtpengine.ports.control }}"
    
    enable_tls=yes
    listen=udp:0.0.0.0:{{ .Values.kamailio.ports.sip }}
    listen=tcp:0.0.0.0:{{ .Values.kamailio.ports.sip }}
    listen=tls:0.0.0.0:{{ .Values.kamailio.ports.ws }}
    
    # --- MODULES ---
    loadmodule "sl.so"
    loadmodule "tm.so"
    loadmodule "rr.so"
    loadmodule "pv.so"
    loadmodule "siputils.so"
    loadmodule "maxfwd.so"
    loadmodule "textops.so"
    loadmodule "rtpengine.so"
    loadmodule "xhttp.so"
    loadmodule "tls.so"
    loadmodule "websocket.so"
    
    modparam("rtpengine", "rtpengine_sock", RTPENGINE_SOCK)
    modparam("tls", "config", "/etc/kamailio/tls.cfg")
    
    # --- MAIN ROUTING LOGIC ---
    request_route {
        if (!mf_process_maxfwd_header("10")) {
            sl_send_reply("483", "Too Many Hops");
            exit;
        }
    
        if (is_method("CANCEL")) {
            if (t_check_trans()) t_relay();
            exit;
        }
    
        if (has_totag()) {
            if (loose_route()) {
                if (is_method("BYE")) {
                    rtpengine_manage();
                }
                route(RELAY);
                exit;
            }
        }
    
        if (is_method("INVITE")) {
            record_route();
            
            # INBOUND FROM TELNYX
            if ($(src_ip) == "192.76.120.10" || $(src_ip) == "192.76.120.11") {
                rtpengine_manage("replace-origin replace-session-connection");
                $ru = "sip:" + $(rU) + "@" + ASTERISK_HOST + ":" + ASTERISK_PORT;
                route(RELAY);
                exit;
            }
            
            # OUTBOUND TO TELNYX (From internal K8s subnets)
            if ($(src_ip) =~ "^10\.") {
                if ($(rU) =~ "^1[0-9]{10}$") { 
                    rtpengine_manage("replace-origin replace-session-connection");
                    $ru = "sip:" + $(rU) + "@sip.telnyx.com";
                    route(RELAY);
                    exit;
                }
            }

            # STANDARD INTERNAL ROUTING TO ASTERISK
            if (proto == WS || proto == WSS) {
                rtpengine_manage("trust-address replace-origin replace-session-connection rtcp-mux-demux ICE=remove RTP/AVP");
                t_on_reply("REPLY_TO_WEBRTC");
            } else {
                rtpengine_manage("replace-origin replace-session-connection");
            }
            $ru = "sip:" + $(rU) + "@" + ASTERISK_HOST + ":" + ASTERISK_PORT;
            route(RELAY);
            exit;
        }
    
        sl_send_reply("501", "Not Implemented");
    }
    
    route[RELAY] {
        if (!t_relay()) sl_reply_error();
        exit;
    }
    
    onreply_route {
        if (has_body("application/sdp")) {
            rtpengine_manage("replace-origin replace-session-connection");
        }
    }
    
    onreply_route[REPLY_TO_WEBRTC] {
        if (has_body("application/sdp")) {
            rtpengine_manage("trust-address replace-origin replace-session-connection rtcp-mux-offer ICE=force UDP/TLS/RTP/SAVPF");
        }
    }
    
    event_route[xhttp:request] {
        set_reply_close();
        set_reply_no_connect();
        if ($hdr(Upgrade)=~"websocket" && $hdr(Connection)=~"Upgrade" && $rm=="GET") {
            if (ws_handle_handshake()) {
                exit;
            }
        }
        xhttp_reply("404", "Not Found", "", "");
    }
    
  tls.cfg: |
    [server:default]
    method = TLSv1.2+
    verify_certificate = no
    require_certificate = no
    private_key = /etc/kamailio/tls/tls.key
    certificate = /etc/kamailio/tls/tls.crt