apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-asterisk
spec:
  serviceName: {{ .Release.Name }}-asterisk
  replicas: {{ .Values.asterisk.replicaCount }}
  selector:
    matchLabels:
      app: asterisk
  template:
    metadata:
      labels:
        app: asterisk
    spec:
      containers:
        - name: asterisk
          image: {{ .Values.asterisk.image }}
          ports:
            - name: sip-internal
              containerPort: {{ .Values.asterisk.ports.sip }}
              protocol: UDP
          volumeMounts:
            - name: asterisk-config-volume
              mountPath: /etc/asterisk/pjsip.conf
              subPath: pjsip.conf
            - name: asterisk-config-volume
              mountPath: /etc/asterisk/extensions.conf
              subPath: extensions.conf
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: asterisk-config-volume
          configMap:
            name: asterisk-config