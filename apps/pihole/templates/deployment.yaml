apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pihole.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "pihole.name" . }}
    helm.sh/chart: {{ include "pihole.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "pihole.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "pihole.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: pihole
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: /tmp
          env:
            - name: TZ
              value: {{ .Values.pihole.tz }}
            - name: FTLCONF_webserver_api_password
              valueFrom:
                secretKeyRef:
                  name: {{ include "pihole.fullname" . }}-auth
                  key: password
            - name: WEB_PORT
              value: "8080"
            - name: FTLCONF_MACVENDORDB
              value: "/etc/pihole/macvendor.db"
            - name: TMPDIR
              value: "/tmp"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: dns-udp
              containerPort: {{ .Values.service.targetDnsPort }}
              protocol: UDP
            - name: dns-tcp
              containerPort: {{ .Values.service.targetDnsPort }}
              protocol: TCP
            - name: web-https
              containerPort: 8443
              protocol: TCP
          volumeMounts:
            - name: etc-pihole
              mountPath: /etc/pihole
            - name: etc-dnsmasq
              mountPath: /etc/dnsmasq.d
            - name: config
              mountPath: /etc/pihole/custom.list
              subPath: custom.list
            - name: config
              mountPath: /etc/dnsmasq.d/02-custom.conf
              subPath: 02-custom.conf
            - name: config
              mountPath: /etc/dnsmasq.d/05-forwarders.conf
              subPath: 05-forwarders.conf
            - name: config
              mountPath: /etc/lighttpd/external.conf
              subPath: external.conf
            - name: tls-cert
              mountPath: /etc/pihole-tls
              readOnly: true
            - name: run
              mountPath: /run
            - name: run
              mountPath: /var/run
            - name: var-log
              mountPath: /var/log
            - name: tmp
              mountPath: /tmp
            - name: spool-cron
              mountPath: /var/spool/cron
      volumes:
        - name: etc-pihole
          emptyDir: {}
        - name: etc-dnsmasq
          emptyDir: {}
        - name: config
          configMap:
            name: {{ include "pihole.fullname" . }}
        - name: tls-cert
          secret:
            secretName: {{ include "pihole.fullname" . }}-tls
            optional: true
        - name: run
          emptyDir: {}
        - name: var-log
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: spool-cron
          emptyDir: {}
