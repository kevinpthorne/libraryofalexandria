{{- if .Values.cloudflareExternaldns.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-externaldns
  namespace: {{ .Values.argoNamespace }}
spec:
  project: default
  source:
    repoURL: https://github.com/kevinpthorne/libraryofalexandria.git
    path: apps/cloudflare-externaldns
    targetRevision: HEAD
    helm:
      valuesObject:
        global:
          ddnsDomain: {{ .Values.cluster.externalDomain }}
          apiKeySecret: cf-key
          apiKeySecretKey: api-key
        external-dns:
          extraArgs:
            - "--default-targets={{ .Values.cluster.externalDomain }}"
            - "--force-default-targets"
          env:
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cf-key
                  key: api-key
                  
          sources:
          - gateway-tlsroute
          - gateway-tcproute
          - gateway-udproute
          - service
          
          annotationFilter: "external-dns.loa.internal/expose in (public)"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: externaldns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    # pull from internet
    managedNamespaceMetadata:
      labels:
        zarf.dev/agent: "ignore"
{{- end }}