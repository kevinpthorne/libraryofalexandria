apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: peerbuckets
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  schema:
    apiVersion: v1alpha1
    kind: PeerBucket
    group: blob.loa.kevinpthorne.com
    spec:
      bucketName: string
      sourceCluster: "string | default=local"
      targetCluster: string
  resources:
    - id: filer-sync-deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: "seaweedfs-sync-${schema.spec.bucketName}"
          namespace: seaweedfs-system
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: seaweedfs-filer-sync
          template:
            metadata:
              labels:
                app: seaweedfs-filer-sync
            spec:
              containers:
              - name: filer-sync
                image: chrislusf/seaweedfs:4.01
                command:
                  - "weed"
                  - "filer.sync"
                args:
                  - "-a=seaweedfs-filer.seaweedfs.svc.cluster.${schema.spec.sourceCluster}:8888"
                  - "-b=seaweedfs-filer.seaweedfs.svc.cluster.${schema.spec.targetCluster}:8888"
                  - "-a.path=/buckets/${schema.spec.bucketName}"
                  - "-b.path=/buckets/${schema.spec.bucketName}"
