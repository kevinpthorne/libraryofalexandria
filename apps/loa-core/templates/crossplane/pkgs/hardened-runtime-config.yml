apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: hardened-runtime-config
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true  # crossplane installs in this app too; TODO put in other app
spec:
  deploymentTemplate:
    spec:
      selector: {}
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: package-runtime
              resources:
                limits:
                  cpu: 500m
                  memory: 384Mi
                requests:
                  cpu: 100m
                  memory: 128Mi
              env:
                - name: GOMEMLIMIT
                  value: 256MiB
                # Forces the Go HTTP client to trust this specific file
                - name: SSL_CERT_FILE
                  value: /etc/x509/ca-bundle.crt
                - name: AWS_CA_BUNDLE
                  value: /etc/x509/ca-bundle.crt
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true 
                capabilities:
                  drop:
                    - ALL
              # Some providers (like SQL or Terraform/Tofu) might need 
              # a writable /tmp directory if they write temporary files.
              # If you see "read-only file system" errors, uncomment the volumeMounts below:
              volumeMounts:
                - mountPath: /tmp
                  name: tmp-volume
                - name: trusted-ca-bundle
                  mountPath: /etc/x509
                  readOnly: true
          volumes:
            - name: tmp-volume
              emptyDir: {}
            - name: trusted-ca-bundle
              configMap:
                name: trusted-ca-bundle