apiVersion: seaweed.seaweedfs.com/v1
kind: Seaweed
metadata:
  name: seaweed-cluster
  namespace: seaweedfs-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  tls:
    enabled: true
    issuerRef:
      name: app-pki-bootstrap-issuer
      kind: ClusterIssuer
  image: chrislusf/seaweedfs:4.33
  volume:
    replicas: 1
    storageClassName: {{ .Values.seaweedfs.storageClass | quote }}
    requests:
      storage: {{ .Values.seaweedfs.size | quote }}
    volumes:
      - name: trusted-ca
        configMap:
          name: trusted-ca-bundle
    volumeMounts:
      - name: trusted-ca
        mountPath: /certs/cas
        readOnly: true
    env:
      - name: SSL_CERT_FILE
        value: "/certs/cas/ca-bundle.crt"
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      runAsUser: 1000
  filer:
    replicas: 1
    persistence:
      enabled: true
      storageClassName: {{ .Values.seaweedfs.storageClass | quote }}
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: "10Gi"
    volumes:
      - name: trusted-ca
        configMap:
          name: trusted-ca-bundle
    volumeMounts:
      - name: trusted-ca
        mountPath: /certs/cas
        readOnly: true
    env:
      - name: SSL_CERT_FILE
        value: "/certs/cas/ca-bundle.crt"
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      runAsUser: 1000
  master:
    replicas: 1
    volumes:
      - name: trusted-ca
        configMap:
          name: trusted-ca-bundle
    volumeMounts:
      - name: trusted-ca
        mountPath: /certs/cas
        readOnly: true
    env:
      - name: SSL_CERT_FILE
        value: "/certs/cas/ca-bundle.crt"
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      runAsUser: 1000
  s3:
    enabled: true
    replicas: 1
    extraArgs:
      - "-cert.file=/certs/s3/tls.crt"
      - "-key.file=/certs/s3/tls.key"
      - "-port.https=8334"
    volumes:
      - name: trusted-ca
        configMap:
          name: trusted-ca-bundle
      - name: s3-tls
        secret:
          secretName: seaweed-cluster-server-tls
    volumeMounts:
      - name: trusted-ca
        mountPath: /certs/cas
        readOnly: true
      - name: s3-tls
        mountPath: /certs/s3
        readOnly: true
    env:
      - name: SSL_CERT_FILE
        value: "/certs/cas/ca-bundle.crt"
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      runAsUser: 1000