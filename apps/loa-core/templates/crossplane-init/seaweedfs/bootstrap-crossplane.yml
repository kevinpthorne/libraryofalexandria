apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crossplane-eso-secret-reader
  namespace: seaweedfs-system
rules:
- apiGroups: [""]
  resources: ["secrets"]
  # Optional: Restrict to ONLY the bootstrap secret for tight security
  resourceNames: ["seaweedfs-creds"] 
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crossplane-eso-secret-writer-binding
  namespace: seaweedfs-system
subjects:
- kind: ServiceAccount
  name: crossplane
  namespace: crossplane-system # Note: Pointing to the SA in the other namespace
roleRef:
  kind: Role
  name: crossplane-eso-secret-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: seaweed-access-key-gen
  namespace: seaweedfs-system
spec:
  length: 20
  digits: 5
  symbols: 0
  noLower: true # Access keys are usually uppercase and numbers
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: seaweed-secret-key-gen
  namespace: seaweedfs-system
spec:
  length: 40
  digits: 10
  symbols: 0 # Avoid symbols to prevent URL-encoding issues with S3
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: k8s-local-seaweedfs-system
spec:
  provider:
    kubernetes:
      remoteNamespace: seaweedfs-system
      server:
        url: "https://kubernetes.default.svc.cluster.local"
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: crossplane-system
      auth:
        serviceAccount:
          # This matches the SA we bound the Role to
          name: crossplane
          namespace: crossplane-system
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: generate-crossplane-seaweedfs-creds
  namespace: seaweedfs-system
spec:
  # How often to rotate the keys (set to 0 if you never want them to change automatically)
  refreshInterval: "0"

  secretStoreRef:
    name: k8s-local-seaweedfs-system # The ClusterSecretStore you defined earlier
    kind: ClusterSecretStore
  
  target:
    name: seaweedfs-creds
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        credentials: |
          [default]
          aws_access_key_id = {{ `{{ .access_key }}` }}
          aws_secret_access_key = {{ `{{ .secret_key }}` }}
          
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: seaweed-access-key-gen
      rewrite:
        - regexp:
            source: "^password$"
            target: "access_key"
            
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: seaweed-secret-key-gen
      rewrite:
        - regexp:
            source: "^password$"
            target: "secret_key"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: generate-seaweedfs-s3-json
  namespace: seaweedfs-system
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: k8s-local-seaweedfs-system # The ClusterSecretStore you defined earlier
    kind: ClusterSecretStore
    
  target:
    name: seaweedfs-s3-config
    template:
      engineVersion: v2
      data:
        s3.json: |
          {
            "identities": [
              {
                "name": "crossplane-admin",
                "credentials": [
                  {
                    "accessKey": "{{ `{{ .access_key }}` }}",
                    "secretKey": "{{ `{{ .secret_key }}` }}"
                  }
                ],
                "actions": ["Admin", "Read", "Write", "List", "Tagging"]
              }
            ]
          }
          
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: seaweed-access-key-gen
      rewrite:
        - regexp:
            source: "^password$"
            target: "access_key"
            
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: seaweed-secret-key-gen
      rewrite:
        - regexp:
            source: "^password$"
            target: "secret_key"