replicaCount: 1

image:
  repository: lscr.io/linuxserver/unifi-network-application
  pullPolicy: IfNotPresent
  tag: latest

mongodb:
  image:
    repository: mongo
    pullPolicy: IfNotPresent
    tag: "3.6"
  persistence:
    storageClass: longhorn
    size: 2Gi
  resources:
    limits:
      cpu: 500m
      memory: 100Mi
    requests:
      cpu: 100m
      memory: 100Mi

persistence:
  storageClass: longhorn
  size: 2Gi

timezone: "America/New_York"

service:
  type: LoadBalancer

podSecurityContext:
  runAsUser: 999
  runAsGroup: 999
  fsGroup: 999
