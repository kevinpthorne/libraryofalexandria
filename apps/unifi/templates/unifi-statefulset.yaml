apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "unifi.fullname" . }}
  labels:
    {{- include "unifi.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "unifi.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "unifi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "unifi.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-cacerts
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command: ["sh", "-c"]
          args:
            - |
              CACERTS_PATH=$(find /usr /opt /etc -name cacerts | head -n 1)
              if [ -n "$CACERTS_PATH" ]; then
                cp "$CACERTS_PATH" /unifi/cacerts
                keytool -importcert -trustcacerts -noprompt -alias cluster-ca -file /certs/cas/ca-bundle.crt -keystore /unifi/cacerts -storepass changeit
              else
                echo "cacerts not found!"
                exit 1
              fi
          volumeMounts:
            - name: unifi-config
              mountPath: /unifi
            - name: trusted-ca
              mountPath: /certs/cas
              readOnly: true
      containers:
        - name: unifi
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: gui-https
              containerPort: 8443
              protocol: TCP
            - name: device-inform
              containerPort: 8080
              protocol: TCP
            - name: stun-udp
              containerPort: 3478
              protocol: UDP
            - name: discovery-udp
              containerPort: 10001
              protocol: UDP
          env:
            - name: TZ
              value: {{ .Values.timezone }}
            - name: RUNAS_UID0
              value: "false"
            - name: UNIFI_UID
              value: "1000"
            - name: UNIFI_GID
              value: "1000"
            - name: DB_NAME
              value: "unifi"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "unifi.fullname" . }}-db-credentials
                  key: unifi-password
            - name: DB_URI
              value: "mongodb://unifi:$(DB_PASSWORD)@{{ include "unifi.fullname" . }}-db:27017/unifi?tls=true&authSource=admin"
            - name: STATDB_URI
              value: "mongodb://unifi:$(DB_PASSWORD)@{{ include "unifi.fullname" . }}-db:27017/unifi_stat?tls=true&authSource=admin"
            - name: JVM_MAX_HEAP_SIZE
              value: "192M"
            - name: JVM_INIT_HEAP_SIZE
              value: "128M"
            - name: JVM_EXTRA_OPTS
              value: "-Djavax.net.ssl.trustStore=/unifi/cacerts -Djavax.net.ssl.trustStorePassword=changeit"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 120
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 60
            periodSeconds: 10
          volumeMounts:
            - name: unifi-config
              mountPath: /unifi
      volumes:
        - name: trusted-ca
          configMap:
            name: trusted-ca-bundle
  volumeClaimTemplates:
    - metadata:
        name: unifi-config
      spec:
        accessModes: [ "ReadWriteOnce" ]
        {{- if .Values.persistence.storageClass }}
        storageClassName: "{{ .Values.persistence.storageClass }}"
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
