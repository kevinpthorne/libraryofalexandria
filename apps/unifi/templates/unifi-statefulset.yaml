apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "unifi.fullname" . }}
  labels:
    {{- include "unifi.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "unifi.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "unifi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "unifi.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: unifi
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: gui-https
              containerPort: 8443
              protocol: TCP
            - name: device-inform
              containerPort: 8080
              protocol: TCP
            - name: stun-udp
              containerPort: 3478
              protocol: UDP
            - name: discovery-udp
              containerPort: 10001
              protocol: UDP
          env:
            - name: TZ
              value: {{ .Values.timezone }}
            - name: RUNAS_UID0
              value: "false"
            - name: UNIFI_UID
              value: "1000"
            - name: UNIFI_GID
              value: "1000"
            - name: DB_NAME
              value: "unifi"
            - name: DB_URI
              valueFrom:
                secretKeyRef:
                  name: {{ include "unifi.fullname" . }}-db-credentials
                  key: unifi-password
                  # Wait, DB_URI needs the full connection string. We can construct it:
                  # mongodb://unifi:${DB_PASSWORD}@{{ include "unifi.fullname" . }}-db:27017/unifi?ssl=true&sslInvalidHostNameAllowed=true
                  # Wait, we can't reference another env var in the valueFrom directly.
                  # But we can use env var expansion in the command, or we can just pass DB_PASSWORD and DB_URI using a shell script,
                  # OR we can use $(DB_PASSWORD) in the environment variable values!
                  # In Kubernetes, $(VAR) syntax expands environment variables defined earlier in the list!
                  # Let's define DB_PASSWORD first, then DB_URI:
                  # - name: DB_PASSWORD
                  #   valueFrom: ...
                  # - name: DB_URI
                  #   value: mongodb://unifi:$(DB_PASSWORD)@{{ include "unifi.fullname" . }}-db:27017/unifi?ssl=true&sslInvalidHostNameAllowed=true
                  # This is extremely clean and natively supported by Kubernetes env var expansion!
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "unifi.fullname" . }}-db-credentials
                  key: unifi-password
            - name: DB_URI
              value: "mongodb://unifi:$(DB_PASSWORD)@{{ include "unifi.fullname" . }}-db:27017/unifi?ssl=true&sslInvalidHostNameAllowed=true"
            - name: STATDB_URI
              value: "mongodb://unifi:$(DB_PASSWORD)@{{ include "unifi.fullname" . }}-db:27017/unifi_stat?ssl=true&sslInvalidHostNameAllowed=true"
          livenessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 120
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 60
            periodSeconds: 10
          volumeMounts:
            - name: unifi-config
              mountPath: /unifi
  volumeClaimTemplates:
    - metadata:
        name: unifi-config
      spec:
        accessModes: [ "ReadWriteOnce" ]
        {{- if .Values.persistence.storageClass }}
        storageClassName: "{{ .Values.persistence.storageClass }}"
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
