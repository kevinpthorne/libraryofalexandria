{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: minecraft-gateway
  labels:
    {{- include "minecraft-server.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: mc-java
      protocol: TCP
      port: {{ .Values.service.javaPort }}
    - name: mc-bedrock
      protocol: UDP
      port: {{ .Values.service.bedrockPort }}
{{- end }}