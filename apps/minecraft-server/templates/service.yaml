apiVersion: v1
kind: Service
metadata:
  name: {{ include "minecraft-server.fullname" . }}
  labels:
    {{- include "minecraft-server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.javaPort }}
      targetPort: mc-java
      protocol: TCP
      name: mc-java
    - port: {{ .Values.service.bedrockPort }}
      targetPort: mc-bedrock
      protocol: UDP
      name: mc-bedrock
  selector:
    {{- include "minecraft-server.selectorLabels" . | nindent 4 }}
