apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minecraft-pvc
  labels:
    {{- include "minecraft-server.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.pvc.storageClass }}
  resources:
    requests:
      storage: {{ .Values.pvc.size }}