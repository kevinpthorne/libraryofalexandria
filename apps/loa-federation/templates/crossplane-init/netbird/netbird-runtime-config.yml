apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: netbird-hardened-runtime-config
  namespace: crossplane-system
spec:
  deploymentTemplate:
    spec:
      selector: {}
      template:
        spec:
          containers:
            - name: package-runtime
              env:
                # Forces the Go HTTP client to trust this specific file
                - name: SSL_CERT_FILE
                  value: /etc/x509/ca-bundle.crt
              volumeMounts:
                - name: trusted-ca-bundle
                  mountPath: /etc/x509
                  readOnly: true
          volumes:
            - name: trusted-ca-bundle
              configMap:
                name: trusted-ca-bundle