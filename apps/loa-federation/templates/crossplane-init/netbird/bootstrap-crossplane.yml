apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crossplane-eso-secret-writer-binding
  namespace: {{ .Values.netbird.controller.namespace }}
subjects:
- kind: ServiceAccount
  name: crossplane
  namespace: crossplane-system # Note: Pointing to the SA in the other namespace
roleRef:
  kind: Role
  name: eso-secret-writer
  apiGroup: rbac.authorization.k8s.io
---
# mgmt namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crossplane-eso-secret-writer
  namespace: {{ .Values.netbird.controller.namespace }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  # Optional: Restrict to ONLY the bootstrap secret for tight security
  resourceNames: ["netbird-api-secret", "netbird-api-secret-source"] 
  verbs: ["get", "list", "watch", "create"]
---
# -----------------------------------------------------------------------------
# 2. GENERATION: Create the API Key in the source namespace
# -----------------------------------------------------------------------------
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: netbird-api-key-gen
  namespace: {{ .Values.netbird.controller.namespace }}
spec:
  length: 32
  digits: 10
  symbols: 0 # Keeping to alphanumeric for API keys
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: generate-netbird-source-secret
  namespace: {{ .Values.netbird.controller.namespace }}
spec:
  # This creates the "Source of Truth" secret
  target:
    name: netbird-api-secret-source 
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: netbird-api-key-gen
      rewrite:
        - regexp:
            source: "^password$" # Looks for the default key output by the generator
            target: "netbird-api-key" # Renames it to what you want in the final Secret
---
# -----------------------------------------------------------------------------
# 4. DISTRIBUTION: Sync the generated key to target namespaces
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: netbird-api-key-distributor
spec:
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: In
        values:
          - "{{ .Values.netbird.controller.namespace }}"
          - crossplane-system
  externalSecretSpec:
    secretStoreRef:
      name: k8s-local-crossplane
      kind: ClusterSecretStore
    target:
      # The final secret name that your deployments will mount
      name: netbird-api-secret 
      creationPolicy: Owner
    data:
      - secretKey: netbird-api-key
        remoteRef:
          key: netbird-api-secret-source # Pulling from the source secret we generated above
          property: netbird-api-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: crossplane-netbird-creds
  namespace: crossplane-system
spec:
  secretStoreRef:
    name: k8s-local-crossplane
    kind: ClusterSecretStore
  target:
    name: crossplane-netbird-creds
    template:
      engineVersion: v2
      data:
        token: "{{ `{{ .api_secret }}` }}"
  data:
    - secretKey: api_secret
      remoteRef:
        key: netbird-api-secret
        property: netbird-api-key