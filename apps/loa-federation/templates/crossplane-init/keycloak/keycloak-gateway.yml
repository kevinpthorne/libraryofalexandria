apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-gateway-app
  namespace: {{ .Values.argoNamespace }}
spec:
  project: default
  source:
    repoURL: https://github.com/kevinpthorne/libraryofalexandria.git
    path: pkgs/gateway-helm
    targetRevision: HEAD
    helm:
      values: |
        endpoints:
        - name: keycloak-app
          hostnames:
          - ident.{{ .Values.cluster.name }}.loa.internal
          ports:
            - port: 443
              protocol: TLS
              tls:
                mode: Passthrough
              targetService: keycloak
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    # pull from internet
    managedNamespaceMetadata:
      labels:
        zarf.dev/agent: "ignore"