apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keydb-restricted
  namespace: {{ .Values.argoNamespace }}
spec:
  project: default
  source:
    repoURL: https://enapter.github.io/charts/
    chart: keydb
    targetRevision: 0.48.0
    helm:
      # We override the values to enforce a restricted security context
      values: |
        imageRepository: ghcr.io/kevinpthorne/keydb
        imageTag: latest  # default pulls x86 image
        nodes: {{ .Values.keydb.instances }}
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
          fsGroup: 1001
          seccompProfile:
            type: RuntimeDefault
        keydb:
          securityContext: # container
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: {{ .Values.keydb.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    # pull from internet
    managedNamespaceMetadata:
      labels:
        zarf.dev/agent: "ignore"