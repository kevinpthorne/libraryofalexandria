apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keydb-restricted
  namespace: {{ .Values.argoNamespace }}
spec:
  project: default
  source:
    repoURL: https://github.com/kevinpthorne/libraryofalexandria.git
    path: pkgs/keydb-helm
    targetRevision: HEAD
    helm:
      valuesObject:
        image:
          repository: ghcr.io/kevinpthorne/keydb
          tag: latest
          pullPolicy: Always
        nodes: {{ .Values.keydb.instances }}
        tls:
          enabled: true
          secretName: keydb-restricted-tls
          caSecretName: keydb-client-ca-public
          authClients: "yes"
          {{- if and .Values.keydb (hasKey .Values.keydb "tls") }}
          {{- toYaml .Values.keydb.tls | nindent 10 }}
          {{- end }}
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: {{ .Values.keydb.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    # pull from internet
    managedNamespaceMetadata:
      labels:
        zarf.dev/agent: "ignore"