apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keydb-restricted-cert
  namespace: {{ .Values.keydb.namespace }}
spec:
  secretName: keydb-restricted-tls
  usages:
    - server auth
    - client auth
  dnsNames:
    - "localhost"
    - "keydb-restricted"
    - "keydb-restricted.{{ .Values.keydb.namespace }}"
    - "keydb-restricted.{{ .Values.keydb.namespace }}.svc"
    - "keydb-restricted-headless"
    - "keydb-restricted-headless.{{ .Values.keydb.namespace }}"
    - "keydb-restricted-headless.{{ .Values.keydb.namespace }}.svc"
    - "*.keydb-restricted-headless.{{ .Values.keydb.namespace }}.svc"
  ipAddresses:
    - "127.0.0.1"
  issuerRef:
    name: {{ .Values.pki.rootCAIssuer }}
    kind: ClusterIssuer
    group: cert-manager.io
  privateKey:
    rotationPolicy: Never
