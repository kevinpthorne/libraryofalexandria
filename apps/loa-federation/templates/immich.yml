apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich-restricted
  namespace: {{ .Values.argoNamespace }}
spec:
  project: default
  source:
    repoURL: https://immich-app.github.io/immich-charts
    chart: immich
    targetRevision: 0.12.0
    helm:
      # We override the values to enforce a restricted security context
      values: |
        valkey:
          enabled: false
        immich:
          persistence:
            library:
              enabled: true
              existingClaim: immich-library-pvc
        controllers:
          main:
            pod:
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
                seccompProfile:
                  type: RuntimeDefault
            containers:
              main:
                resources:
                  requests:
                    memory: 256Mi
                  limits:
                    memory: 2Gi
                probes:
                  startup:
                    spec:
                      failureThreshold: 120
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                env:
                  NODE_OPTIONS: "--max-old-space-size=1536"
                  IMMICH_CONFIG_FILE: "/etc/immich/immich-config.json"
                  REDIS_HOSTNAME: "127.0.0.1"
                  REDIS_PORT: "6379"
                  DB_URL: 'postgres://immich@{{ .Values.pgedge.appName }}-{{ .Values.cluster.name }}-data-rw.{{ .Values.pgedge.namespace }}.svc:5432/immich?sslmode=verify-full&sslcert=/certs/pgedge-client/tls.crt&sslkey=/certs/pgedge-client/tls.key&sslrootcert=/certs/pgedge-client/ca.crt&options=-c%20search_path=public'
                  DB_HOSTNAME: ""
                  DB_USERNAME: ""
                  DB_PASSWORD: ""
                  DB_DATABASE_NAME: ""
              stunnel:
                image:
                  repository: cgr.dev/chainguard/stunnel
                  tag: latest
                command: ["stunnel", "/etc/stunnel/stunnel.conf"]
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  runAsNonRoot: true
                  runAsUser: 1000
                  runAsGroup: 1000
                  capabilities:
                    drop:
                      - ALL
        persistence:
          immich-config:
            type: secret
            name: immich-oauth-secret
            globalMounts:
              - path: /etc/immich
                readOnly: true
          stunnel-conf:
            type: configMap
            name: immich-stunnel-conf
            globalMounts:
              - path: /etc/stunnel
                readOnly: true
          keydb-client-cert:
            type: secret
            name: keydb-immich-client-cert
            globalMounts:
              - path: /certs/keydb-client
                readOnly: true
          pgedge-client-cert:
            type: secret
            name: pgedge-immich-client-cert
            globalMounts:
              - path: /certs/pgedge-client
                readOnly: true
          immich-tls:
            type: secret
            name: immich-tls
            globalMounts:
              - path: /certs/immich-server
                readOnly: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: {{ .Values.immich.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    # pull from internet
    managedNamespaceMetadata:
      labels:
        zarf.dev/agent: "ignore"
---
apiVersion: db.loa.kevinpthorne.com/v1alpha1
kind: KeydbClient
metadata:
  name: immich
  namespace: {{ .Values.argoNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1" # KeydbClient comes in wave 0
spec:
  appName: immich
  appNamespace: {{ .Values.immich.namespace }}
---
apiVersion: db.loa.kevinpthorne.com/v1alpha1
kind: PrivateDatabase
metadata:
  name: immich-database
  namespace: {{ .Values.argoNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  databaseName: immich
  userName: immich
  appNamespace: {{ .Values.immich.namespace }}
  extensions:
    - vector
    - earthdistance
    - cube
---
apiVersion: seaweed.seaweedfs.com/v1
kind: S3Identity
metadata:
  name: immich
  namespace: {{ .Values.immich.namespace }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  seaweedRef:
    name: seaweed-cluster
    namespace: seaweedfs-system
---
apiVersion: seaweed.seaweedfs.com/v1
kind: S3Credentials
metadata:
  name: immich-s3-creds
  namespace: {{ .Values.immich.namespace }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  seaweedRef:
    name: seaweed-cluster
    namespace: seaweedfs-system
  identityRef:
    name: immich
  secretRef:
    name: immich-s3-creds
---
apiVersion: seaweed.seaweedfs.com/v1
kind: Bucket
metadata:
  name: immich-data
  namespace: {{ .Values.immich.namespace }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  clusterRef:
    name: seaweed-cluster
    namespace: seaweedfs-system
  name: immich-data
---
apiVersion: seaweed.seaweedfs.com/v1
kind: S3Policy
metadata:
  name: immich-policy
  namespace: {{ .Values.immich.namespace }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  seaweedRef:
    name: seaweed-cluster
    namespace: seaweedfs-system
  statements:
    - effect: Allow
      actions: [s3:GetObject, s3:PutObject, s3:DeleteObject, s3:ListBucket]
      resources: [
        "immich-data/*", "immich-data"
      ]
---
apiVersion: seaweed.seaweedfs.com/v1
kind: S3PolicyBinding
metadata:
  name: immich-policy-binding
  namespace: {{ .Values.immich.namespace }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  seaweedRef:
    name: seaweed-cluster
    namespace: seaweedfs-system
  policyRef:
    name: immich-policy
  subjects:
    - kind: S3Identity
      name: immich
---
apiVersion: seaweed.seaweedfs.com/v1
kind: ResourceReferenceGrant
metadata:
  name: seaweed-immich-grant
  namespace: seaweedfs-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  from:
    - group: seaweed.seaweedfs.com
      kind: S3Identity
      namespace: {{ .Values.immich.namespace }}
    - group: seaweed.seaweedfs.com
      kind: S3Credentials
      namespace: {{ .Values.immich.namespace }}
    - group: seaweed.seaweedfs.com
      kind: Bucket
      namespace: {{ .Values.immich.namespace }}
    - group: seaweed.seaweedfs.com
      kind: S3Policy
      namespace: {{ .Values.immich.namespace }}
    - group: seaweed.seaweedfs.com
      kind: S3PolicyBinding
      namespace: {{ .Values.immich.namespace }}
  to:
    - group: seaweed.seaweedfs.com
      kind: Seaweed
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-library-pv
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 500Gi
  csi:
    driver: seaweedfs-csi-driver
    volumeHandle: immich-library
    volumeAttributes:
      path: "/immich-library"
  persistentVolumeReclaimPolicy: Retain
  storageClassName: seaweedfs-csi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-library-pvc
  namespace: {{ .Values.immich.namespace }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Gi
  storageClassName: seaweedfs-csi
  volumeName: immich-library-pv
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: immich-stunnel-conf
  namespace: {{ .Values.immich.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
data:
  stunnel.conf: |
    foreground = yes
    pid =
    [redis]
    client = yes
    accept = 127.0.0.1:6379
    connect = keydb-restricted-keydb-helm.{{ .Values.keydb.namespace }}.svc.cluster.local:6380
    verifyChain = yes
    CAfile = /certs/keydb-client/ca.crt
    cert = /certs/keydb-client/tls.crt
    key = /certs/keydb-client/tls.key
    [https]
    accept = 8443
    connect = 127.0.0.1:2283
    cert = /certs/immich-server/tls.crt
    key = /certs/immich-server/tls.key
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich-tls
  namespace: {{ .Values.argoNamespace }}
spec:
  project: default
  source:
    repoURL: https://github.com/kevinpthorne/libraryofalexandria.git
    path: pkgs/service-tls-helm
    targetRevision: HEAD
    helm:
      valuesObject:
        svcName: "immich"
        cert:
          sans:
            - "immich.{{ .Values.cluster.name }}.loa.internal"
            - "immich.kpt.link"
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.immich.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich-gateway
  namespace: {{ .Values.argoNamespace }}
spec:
  project: default
  source:
    repoURL: https://github.com/kevinpthorne/libraryofalexandria.git
    path: pkgs/gateway-helm
    targetRevision: HEAD
    helm:
      valuesObject:
        endpoints:
          - name: immich
            createGateway: false
            gatewayName: local-gateway
            gatewayNamespace: kube-system
            hostnames:
              - "immich.{{ .Values.cluster.name }}.loa.internal"
              - "immich.kpt.link"
            ports:
              - port: 443
                protocol: TLS
                targetPort: 8443
                targetService: immich-tls
                annotations:
                  "external-dns.loa.internal/federate": "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.immich.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: v1
kind: Service
metadata:
  name: immich-tls
  namespace: {{ .Values.immich.namespace }}
  annotations:
    service.cilium.io/global: "true"
    io.cilium/service-affinity: local
spec:
  selector:
    app.kubernetes.io/name: server
    app.kubernetes.io/controller: main
  ports:
    - name: https
      port: 8443
      targetPort: 8443
      protocol: TCP
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: immich-oauth-password
  namespace: {{ .Values.immich.namespace }}
spec:
  length: 32
  digits: 5
  symbols: 0
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-oauth-secret
  namespace: {{ .Values.immich.namespace }}
spec:
  refreshInterval: "0"
  target:
    name: immich-oauth-secret
    template:
      engineVersion: v2
      data:
        secret: "{{ `{{ .password }}` }}"
        immich-config.json: |
          {
            "oauth": {
              "enabled": true,
              "issuerUrl": "https://ident.kpt.link/realms/loa/.well-known/openid-configuration",
              "clientId": "immich",
              "clientSecret": "{{ `{{ .password }}` }}",
              "mobileRedirectUri": "app.immich:///oauth-callback",
              "buttonText": "Login with Keycloak",
              "autoRegister": true,
              "autoLaunch": true,
              "scope": "openid email profile"
            }
          }
  dataFrom:
  - sourceRef:
      generatorRef:
        apiVersion: generators.external-secrets.io/v1alpha1
        kind: Password
        name: immich-oauth-password
---
apiVersion: authn.loa.kevinpthorne.com/v1alpha1
kind: KeycloakClient
metadata:
  name: immich
  namespace: {{ .Values.immich.namespace }}
spec:
  clientId: immich
  secretRef:
    name: immich-oauth-secret
    key: secret
  redirectUris:
    - "app.immich:///oauth-callback"
    - "https://immich.kpt.link/auth/login"
    - "https://immich.kpt.link/user-settings"
    - "https://immich.{{ .Values.cluster.name }}.loa.internal/auth/login"
    - "https://immich.{{ .Values.cluster.name }}.loa.internal/user-settings"