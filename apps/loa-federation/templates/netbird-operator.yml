apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: netbird-controller
  namespace: {{ .Values.argoNamespace }}
spec:
  project: default
  source:
    repoURL: 'https://netbirdio.github.io/helms'
    targetRevision: '0.3.1' # Latest release
    chart: kubernetes-operator
    helm:
      values: |
        managementURL: {{ include "netbird-api-url" . }}
        netbirdAPI:
          host: {{ include "netbird-api-url" . }}
          keyFromSecret:
            name: "netbird-api-secret"
            key: "netbird-api-key"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: {{ .Values.netbird.agent.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    # pull from internet
    managedNamespaceMetadata:
      labels:
        zarf.dev/agent: "ignore"