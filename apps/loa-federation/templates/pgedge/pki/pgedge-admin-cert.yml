apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: admin-client-cert  # used for init spock
  namespace: {{ .Values.pgedge.namespace }}
spec:
  secretName: admin-client-cert
  usages:
    - client auth
  commonName: admin
  issuerRef:
    name: pgedge-{{ .Values.pgedge.appName }}-client-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
  privateKey:
    rotationPolicy: Never