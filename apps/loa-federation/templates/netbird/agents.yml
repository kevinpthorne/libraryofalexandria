apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: netbird-agent
  namespace: {{ .Values.netbird.namespace }}
spec:
  selector:
    matchLabels:
      app: netbird-agent
  template:
    metadata:
      labels:
        app: netbird-agent
    spec:
      hostNetwork: true
      containers:
      - name: netbird
        image: netbirdio/netbird:0.70.4
        securityContext:
          privileged: true
          capabilities:
            add: ["NET_ADMIN", "SYS_MODULE"]
        env:
        - name: NB_MANAGEMENT_URL
          value: {{ include "netbird-api-url" . }} 
        - name: NB_ADMIN_URL
          value: {{ include "netbird-api-url" . }}
        - name: NB_SETUP_KEY
          valueFrom:
            secretKeyRef:
              name: netbird-setup-key
              key: setup-key
        - name: NB_ARGS
          value: "--allow-net"
        volumeMounts:
        - name: dev-net-tun
          mountPath: /dev/net/tun
        - name: netbird-data
          mountPath: /var/lib/netbird
      volumes:
      - name: dev-net-tun
        hostPath:
          path: /dev/net/tun
      - name: netbird-data
        hostPath:
          path: /var/lib/netbird