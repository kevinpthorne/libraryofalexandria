apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: keycloakclients
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  schema:
    apiVersion: v1alpha1
    kind: KeycloakClient
    group: authn.loa.kevinpthorne.com
    spec:
      realm: "string | default=loa"
      clientId: string
      secret: "string | default=null"
      secretRef:
        name: "string | default=null"
        key: "string | default=null"
      serviceAccountsEnabled: "boolean | default=false"
      redirectUris: "[]string | default=[]"
  resources:
    - id: syncJob
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: keycloak-client-sync-${schema.metadata.name}
          namespace: keycloak
        spec:
          ttlSecondsAfterFinished: 3600
          template:
            spec:
              restartPolicy: OnFailure
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
                seccompProfile:
                  type: RuntimeDefault
              containers:
              - name: sync
                image: adorsys/keycloak-config-cli:latest
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: ["ALL"]
                command:
                  - "sh"
                  - "-c"
                  - |
                    cat << 'EOF' > /tmp/client.json
                                        ${json.marshal({
                      "realm": schema.spec.realm,
                      "clients": [
                        schema.spec.secret != "null" ? {
                          "clientId": schema.spec.clientId,
                          "secret": schema.spec.secret,
                          "serviceAccountsEnabled": schema.spec.serviceAccountsEnabled,
                          "redirectUris": schema.spec.redirectUris
                        } : {
                          "clientId": schema.spec.clientId,
                          "secret": "REPLACE_ME_SECRET",
                          "serviceAccountsEnabled": schema.spec.serviceAccountsEnabled,
                          "redirectUris": schema.spec.redirectUris
                        }
                      ]
                    })}
                    EOF
                    if [ -n "$CLIENT_SECRET" ]; then
                      sed -i "s/REPLACE_ME_SECRET/$CLIENT_SECRET/g" /tmp/client.json
                    elif grep -q REPLACE_ME_SECRET /tmp/client.json; then
                      sed -i '/"secret": "REPLACE_ME_SECRET"/d' /tmp/client.json
                    fi
                    /opt/jboss/keycloak-config-cli.jar --import.files=/tmp/client.json
                env: >-
                  ${[
                    {
                      "name": "KEYCLOAK_URL",
                      "value": "https://keycloak.keycloak.svc.cluster.local:8443"
                    },
                    {
                      "name": "KEYCLOAK_USER",
                      "value": "admin"
                    },
                    {
                      "name": "KEYCLOAK_PASSWORD",
                      "valueFrom": {
                        "secretKeyRef": {
                          "name": "keycloak",
                          "key": "admin-password"
                        }
                      }
                    },
                    {
                      "name": "KEYCLOAK_AVAILABILITYPROBE_TIMEOUT",
                      "value": "120s"
                    }
                  ] + (schema.spec.secretRef.name != "null" ? [
                    {
                      "name": "CLIENT_SECRET",
                      "valueFrom": {
                        "secretKeyRef": {
                          "name": schema.spec.secretRef.name,
                          "key": schema.spec.secretRef.key
                        }
                      }
                    }
                  ] : [])}
