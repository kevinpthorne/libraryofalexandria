apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: keycloakclients
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  schema:
    apiVersion: v1alpha1
    kind: KeycloakClient
    group: authn.loa.kevinpthorne.com
    spec:
      realm: "string | default=loa"
      clientId: string
      secret: "string | default=null"
      secretRef:
        name: "string | default=null"
        key: "string | default=null"
      serviceAccountsEnabled: "boolean | default=false"
      redirectUris: "[]string | default=[]"
  resources:
    # 1. ServiceAccount for the sync Job to query secrets in client namespaces
    - id: syncServiceAccount
      template:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: keycloak-client-sync-sa-${schema.metadata.name}
          namespace: keycloak
          labels: >-
            ${has(schema.metadata.labels) && "argocd.argoproj.io/instance" in schema.metadata.labels ? {"argocd.argoproj.io/instance": schema.metadata.labels["argocd.argoproj.io/instance"]} : {}}
          annotations: >-
            ${has(schema.metadata.annotations) && "argocd.argoproj.io/tracking-id" in schema.metadata.annotations ? {"argocd.argoproj.io/tracking-id": schema.metadata.annotations["argocd.argoproj.io/tracking-id"]} : {}}

    # 2. ClusterRole allowing GET access to Secrets
    - id: syncClusterRole
      template:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: keycloak-client-sync-cr-${schema.metadata.name}
          labels: >-
            ${has(schema.metadata.labels) && "argocd.argoproj.io/instance" in schema.metadata.labels ? {"argocd.argoproj.io/instance": schema.metadata.labels["argocd.argoproj.io/instance"]} : {}}
          annotations: >-
            ${has(schema.metadata.annotations) && "argocd.argoproj.io/tracking-id" in schema.metadata.annotations ? {"argocd.argoproj.io/tracking-id": schema.metadata.annotations["argocd.argoproj.io/tracking-id"]} : {}}
        rules:
        - apiGroups: [""]
          resources: ["secrets"]
          verbs: ["get"]

    # 3. ClusterRoleBinding linking ServiceAccount to ClusterRole
    - id: syncClusterRoleBinding
      template:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: keycloak-client-sync-crb-${schema.metadata.name}
          labels: >-
            ${has(schema.metadata.labels) && "argocd.argoproj.io/instance" in schema.metadata.labels ? {"argocd.argoproj.io/instance": schema.metadata.labels["argocd.argoproj.io/instance"]} : {}}
          annotations: >-
            ${has(schema.metadata.annotations) && "argocd.argoproj.io/tracking-id" in schema.metadata.annotations ? {"argocd.argoproj.io/tracking-id": schema.metadata.annotations["argocd.argoproj.io/tracking-id"]} : {}}
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: keycloak-client-sync-cr-${schema.metadata.name}
        subjects:
        - kind: ServiceAccount
          name: keycloak-client-sync-sa-${schema.metadata.name}
          namespace: keycloak

    # 4. Job running in keycloak namespace to sync client representation
    - id: syncJob
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: keycloak-client-sync-${schema.metadata.name}-v7
          namespace: keycloak
          labels: >-
            ${has(schema.metadata.labels) && "argocd.argoproj.io/instance" in schema.metadata.labels ? {"argocd.argoproj.io/instance": schema.metadata.labels["argocd.argoproj.io/instance"]} : {}}
          annotations: >-
            ${has(schema.metadata.annotations) && "argocd.argoproj.io/tracking-id" in schema.metadata.annotations ? {"argocd.argoproj.io/tracking-id": schema.metadata.annotations["argocd.argoproj.io/tracking-id"]} : {}}
        spec:
          ttlSecondsAfterFinished: 3600
          template:
            spec:
              restartPolicy: OnFailure
              serviceAccountName: keycloak-client-sync-sa-${schema.metadata.name}
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
                seccompProfile:
                  type: RuntimeDefault
              containers:
              - name: sync
                image: adorsys/keycloak-config-cli:latest
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: ["ALL"]
                command:
                  - "sh"
                  - "-c"
                  - |
                    APISERVER=https://kubernetes.default.svc
                    SERVICEACCOUNT=/var/run/secrets/kubernetes.io/serviceaccount
                    TOKEN=$(cat $SERVICEACCOUNT/token)
                    CACERT=$SERVICEACCOUNT/ca.crt

                    CLIENT_SECRET=""
                    if [ "${schema.spec.secretRef.name}" != "null" ]; then
                      echo "Fetching secret ${schema.spec.secretRef.name} from namespace ${schema.metadata.namespace}..."
                      SECRET_JSON=$(wget -qO- --no-check-certificate --header="Authorization: Bearer $TOKEN" "$APISERVER/api/v1/namespaces/${schema.metadata.namespace}/secrets/${schema.spec.secretRef.name}")
                      CLIENT_SECRET=$(echo "$SECRET_JSON" | tr -d ' \n\r' | grep -o '"'"${schema.spec.secretRef.key}"'":"[^"]*' | grep -o '[^"]*$' | base64 -d)
                    fi

                    # Create a Java Truststore from the mounted CA bundle
                    if [ -f /etc/x509/cas/ca-bundle.crt ]; then
                      echo "Generating truststore from ca-bundle.crt..."
                      keytool -importcert -noprompt -file /etc/x509/cas/ca-bundle.crt -keystore /tmp/truststore.p12 -storetype PKCS12 -alias custom-ca -storepass changeit
                    fi

                    cat << 'EOF' > /tmp/client.json
                                        ${json.marshal({
                      "realm": schema.spec.realm,
                      "clients": [
                        schema.spec.secret != "null" ? {
                          "clientId": schema.spec.clientId,
                          "secret": schema.spec.secret,
                          "serviceAccountsEnabled": schema.spec.serviceAccountsEnabled,
                          "redirectUris": schema.spec.redirectUris
                        } : {
                          "clientId": schema.spec.clientId,
                          "secret": "REPLACE_ME_SECRET",
                          "serviceAccountsEnabled": schema.spec.serviceAccountsEnabled,
                          "redirectUris": schema.spec.redirectUris
                        }
                      ]
                    })}
                    EOF
                    if [ -n "$CLIENT_SECRET" ]; then
                      sed -i "s/REPLACE_ME_SECRET/$CLIENT_SECRET/g" /tmp/client.json
                    elif grep -q REPLACE_ME_SECRET /tmp/client.json; then
                      sed -i '/"secret": "REPLACE_ME_SECRET"/d' /tmp/client.json
                    fi
                    java -Djavax.net.ssl.trustStore=/tmp/truststore.p12 -Djavax.net.ssl.trustStorePassword=changeit -jar /app/keycloak-config-cli.jar
                env:
                - name: KEYCLOAK_URL
                  value: "https://keycloak.keycloak.svc.cluster.local:8443"
                - name: KEYCLOAK_USER
                  value: "admin"
                - name: KEYCLOAK_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: keycloak
                      key: admin-password
                - name: KEYCLOAK_AVAILABILITYPROBE_TIMEOUT
                  value: "120s"
                - name: IMPORT_FILES_LOCATIONS
                  value: "/tmp/client.json"
                volumeMounts:
                - name: cas
                  mountPath: /etc/x509/cas
                  readOnly: true
              volumes:
              - name: cas
                configMap:
                  name: trusted-ca-bundle
