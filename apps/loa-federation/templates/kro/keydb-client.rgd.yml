apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: keydbclients
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  schema:
    apiVersion: v1alpha1
    kind: KeydbClient
    group: db.loa.kevinpthorne.com
    spec:
      appName: string
      appNamespace: string
  resources:
    - id: clientCert
      template:
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: keydb-${schema.spec.appName}-client-cert
          namespace: "${schema.spec.appNamespace}"
        spec:
          secretName: keydb-${schema.spec.appName}-client-cert
          usages:
            - client auth
          commonName: "${schema.spec.appName}"
          issuerRef:
            name: keydb-client-ca-issuer
            kind: ClusterIssuer
            group: cert-manager.io
          privateKey:
            rotationPolicy: Never
