apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loa-voip
  namespace: {{ .Values.argoNamespace }}
spec:
  project: default
  source:
    repoURL: https://github.com/kevinpthorne/libraryofalexandria.git
    path: apps/loa-voip
    targetRevision: HEAD
    helm:
      valuesObject:
        cluster: {{ .Values.cluster | toYaml | nindent 8 }}
        global:
          domain: "voip.{{ .Values.cluster.name | default "k" }}.loa.internal"
  destination:
    server: https://kubernetes.default.svc
    namespace: voip
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        zarf.dev/agent: "ignore"

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loa-voip-tls
  namespace: {{ .Values.argoNamespace }}
spec:
  project: default
  source:
    repoURL: https://github.com/kevinpthorne/libraryofalexandria.git
    path: pkgs/service-tls-helm
    targetRevision: HEAD
    helm:
      valuesObject:
        svcName: "loa-voip"
        cluster:
          name: {{ .Values.cluster.name | default "k" }}
        cert:
          secretName: "loa-voip-kamailio-tls"
          sans:
            - "voip.{{ .Values.cluster.name | default "k" }}.loa.internal"
  destination:
    server: https://kubernetes.default.svc
    namespace: voip
  syncPolicy:
    automated:
      prune: true
      selfHeal: true