apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pihole
  namespace: {{ .Values.argoNamespace }}
spec:
  project: default
  source:
    repoURL: https://github.com/kevinpthorne/libraryofalexandria.git
    path: apps/pihole
    targetRevision: HEAD
    helm:
      valuesObject:
        tz: "EDT"
        dnsServers: 
          {{- $dns := (((.Values.cluster | default dict).virtualIps | default dict).reservations | default dict).dns }}
          {{- if $dns }}
          - {{ $dns }}
          {{- end }}
          - 1.1.1.3  # cloudflare no malware/no adult
          - 208.67.222.123 # opendns family shield 1
          - 208.67.220.123 # opendns family shield 2
        {{- $pihole := (((.Values.cluster | default dict).virtualIps | default dict).reservations | default dict).pihole }}
        {{- if $pihole }}
        staticIP: {{ $pihole }}
        {{- end }}
        domain: pihole.k.loa.internal # match below
  destination:
    server: https://kubernetes.default.svc
    namespace: pihole
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pihole-gateway
  namespace: {{ .Values.argoNamespace }}
spec:
  project: default
  source:
    repoURL: https://github.com/kevinpthorne/libraryofalexandria.git
    path: pkgs/gateway-helm
    targetRevision: HEAD
    helm:
      valuesObject:
        endpoints:
          - name: pihole
            hostnames:
              - "pihole.k.loa.internal"
            ports:
              - port: 443
                protocol: TLS
                targetPort: 443
                targetService: pihole
  destination:
    server: https://kubernetes.default.svc
    namespace: pihole
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pihole-tls
  namespace: {{ .Values.argoNamespace }}
spec:
  project: default
  source:
    repoURL: https://github.com/kevinpthorne/libraryofalexandria.git
    path: pkgs/service-tls-helm
    targetRevision: HEAD
    helm:
      valuesObject:
        svcName: "pihole"
        cert:
          sans:
            - "pihole.k.loa.internal"
  destination:
    server: https://kubernetes.default.svc
    namespace: pihole
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
