apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jellyfin
  namespace: {{ .Values.argoNamespace }}
spec:
  project: default
  source:
    repoURL: https://jellyfin.github.io/jellyfin-helm
    chart: jellyfin
    targetRevision: 3.2.0
    helm:
      valuesObject:
        podSecurityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
          seccompProfile:
            type: RuntimeDefault
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          runAsNonRoot: true
          runAsUser: 1000
        persistence:
          config:
            enabled: true
            storageClass: longhorn
            size: 10Gi
          media:
            enabled: true
            type: pvc
            storageClass: longhorn
            size: 250Gi
        extraVolumes:
          - name: jellyfin-tls
            secret:
              secretName: jellyfin-tls
        extraVolumeMounts:
          - name: jellyfin-tls
            mountPath: /certs
            readOnly: true
        extraInitContainers:
          - name: pem-to-pkcs12
            image: alpine/openssl:3.5.4
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              runAsUser: 1000
              runAsGroup: 1000
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -ex
                mkdir -p /config/certs
                openssl pkcs12 -export -out /config/certs/jellyfin.pfx -inkey /certs/tls.key -in /certs/tls.crt -passout pass:jellyfin
                chown -R 1000:1000 /config/certs
                chmod -R 770 /config/certs
                
                mkdir -p /config/config
                if [ ! -f /config/config/network.xml ]; then
                  printf '<?xml version="1.0" encoding="utf-8"?>\n<NetworkConfiguration xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">\n  <RequireHttps>false</RequireHttps>\n  <CertificatePath>/config/certs/jellyfin.pfx</CertificatePath>\n  <CertificatePassword>jellyfin</CertificatePassword>\n</NetworkConfiguration>\n' > /config/config/network.xml
                else
                  if ! grep -q "<CertificatePath>" /config/config/network.xml; then
                    sed -i 's|</NetworkConfiguration>|  <CertificatePath>/config/certs/jellyfin.pfx</CertificatePath>\n  <CertificatePassword>jellyfin</CertificatePassword>\n</NetworkConfiguration>|' /config/config/network.xml
                  fi
                fi
                chown -R 1000:1000 /config/config
                chmod -R 770 /config/config
            volumeMounts:
              - name: jellyfin-tls
                mountPath: /certs
                readOnly: true
              - name: config
                mountPath: /config
  destination:
    server: https://kubernetes.default.svc
    namespace: jellyfin
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        zarf.dev/agent: "ignore"

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jellyfin-tls
  namespace: {{ .Values.argoNamespace }}
spec:
  project: default
  source:
    repoURL: https://github.com/kevinpthorne/libraryofalexandria.git
    path: pkgs/service-tls-helm
    targetRevision: HEAD
    helm:
      valuesObject:
        svcName: "jellyfin"
        cert:
          sans:
            - "jellyfin.k.loa.internal"
  destination:
    server: https://kubernetes.default.svc
    namespace: jellyfin
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jellyfin-gateway
  namespace: {{ .Values.argoNamespace }}
spec:
  project: default
  source:
    repoURL: https://github.com/kevinpthorne/libraryofalexandria.git
    path: pkgs/gateway-helm
    targetRevision: HEAD
    helm:
      valuesObject:
        endpoints:
          - name: jellyfin
            createGateway: false
            gatewayName: local-gateway
            gatewayNamespace: kube-system
            hostnames:
              - "jellyfin.k.loa.internal"
            ports:
              - port: 443
                protocol: TLS
                targetPort: 8920
                targetService: jellyfin-tls
  destination:
    server: https://kubernetes.default.svc
    namespace: jellyfin
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin-tls
  namespace: jellyfin
spec:
  selector:
    app.kubernetes.io/name: jellyfin
  ports:
    - name: https
      port: 8920
      targetPort: 8920
      protocol: TCP
